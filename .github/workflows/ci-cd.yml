name: CI/CD Phoenix Orders

on:
  push:
    branches: [ main, tonys, "*/dev" ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ghcr.io/tony007-infor/jamac-backend

jobs:
  build-and-test:
    name: Build y Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: phoenix_ci_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pgsql, mbstring, bcmath, gd, zip
          coverage: none

      - name: Instalar dependencias PHP
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Preparar .env para pruebas
        run: cp .env.example .env

      - name: Generar Application Key
        run: php artisan key:generate

      - name: Ajustar credenciales de test al contenedor de CI
        run: |
          sed -i 's/<env name="DB_DATABASE" value="[^"]*"\/>/<env name="DB_DATABASE" value="phoenix_ci_db"\/>/' phpunit.xml
          sed -i 's/<env name="DB_USERNAME" value="[^"]*"\/>/<env name="DB_USERNAME" value="postgres"\/>/' phpunit.xml
          sed -i 's/<env name="DB_PASSWORD" value="[^"]*"\/>/<env name="DB_PASSWORD" value="ci_test_password"\/>/' phpunit.xml

      - name: Ejecutar pruebas automatizadas
        run: vendor/bin/phpunit

  build-and-push-image:
    name: Build y Push de Imagen Docker
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Despliegue a Producción (EC2)
    needs: build-and-push-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Desplegar imagen Docker en el servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            if ! command -v docker &> /dev/null; then
              echo "Docker no está instalado. Instalando..."
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo usermod -aG docker $USER
              echo "Docker instalado correctamente."
            else
              echo "Docker ya está instalado, continuando..."
            fi

            echo "Descargando la nueva imagen desde el registry..."
            sudo docker pull ${{ env.IMAGE_NAME }}:latest

            echo "Deteniendo el contenedor anterior (si existe)..."
            sudo docker stop jamac-backend || true
            sudo docker rm jamac-backend || true

            echo "Levantando el contenedor nuevo..."
            sudo docker run -d \
              --name jamac-backend \
              --network host \
              --env-file /var/www/backend/.env \
              --restart unless-stopped \
              ${{ env.IMAGE_NAME }}:latest

            sleep 5

            echo "Corriendo migraciones y actualizando documentación de Swagger..."
            sudo docker exec jamac-backend php artisan migrate --force
            sudo docker exec jamac-backend php artisan optimize:clear
            sudo docker exec jamac-backend php artisan l5-swagger:generate

            echo "Limpiando imágenes viejas sin usar..."
            sudo docker image prune -f

            echo "✅ Despliegue con Docker completado exitosamente"
